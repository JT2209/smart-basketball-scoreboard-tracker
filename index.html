<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Smart Basketball Scoreboard Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f59607;
      color: white;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
    }

    .image {
  position: relative;
  top: 20px;
  left: 30px;
  width: 150px; /* adjust size */
  height: auto;
}

    h1 {
      margin-bottom: 20px;
      font-size: 2.5rem;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: center;
      margin-bottom: 30px;
    }

    .team {
      background: #111;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
    }

    .team h2 {
      font-size: 2rem;
      margin-bottom: 15px;
    }

    .score {
      font-size: 5rem;
      margin: 20px 0;
      color: #06ff27;
    }

    .controls button,
    .clock-controls button {
      margin: 5px;
      padding: 10px 16px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button {
      background: #12c2da;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    .center-panel {
      margin: 30px 0;
      background: #1b1b1b;
      border-radius: 12px;
      padding: 20px;
    }

    .clock {
      font-size: 4rem;
      margin: 15px 0;
      color: #ffdb0f;
    }

    .game-info {
      display: flex;
      justify-content: center;
      gap: 40px;
      font-size: 1.2rem;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .stat-box {
      background: #333;
      padding: 10px 18px;
      border-radius: 8px;
    }

    .setup {
      margin-bottom: 25px;
    }

    .setup input {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      font-size: 1rem;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.95rem;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class ="image" ><img src="C:\Users\James\OneDrive\Pictures\special-olympics-logo.png" alt="Special Olympics Logo" width="150" height="200" /></span>
    <h1>Basketball Scoreboard Tracker - WDSRA</h1>

    <div class="setup">
      <input type="text" id="homeName" placeholder="Home Team Name" value="Home Team">
      <input type="text" id="awayName" placeholder="Away Team Name" value="Away Team">
      <button onclick="setTeamNames()">Start Game</button>
    </div>

    <div class="scoreboard">
      <div class="team">
        <h2 id="homeTeam">Home Team</h2>
        <div class="score" id="homeScore">0</div>
        <div class="controls">
          <button onclick="updateScore('home', 1)">+1</button>
          <button onclick="updateScore('home', 2)">+2</button>
          <button onclick="updateScore('home', 3)">+3</button>
          <button onclick="updateScore('home', -1)">-1</button>
        </div>
        <p>Fouls: <span id="homeFouls">0</span></p>
        <button onclick="updateFouls('home', 1)">Add Foul</button>
        <button onclick="updateFouls('home', -1)">Remove Foul</button>
        <p>Timeouts: <span id="homeTimeouts">5</span></p>
        <button onclick="updateTimeouts('home', -1)">Use Timeout</button>
      </div>

      <div class="team">
        <h2 id="awayTeam">Away Team</h2>
        <div class="score" id="awayScore">0</div>
        <div class="controls">
          <button onclick="updateScore('away', 1)">+1</button>
          <button onclick="updateScore('away', 2)">+2</button>
          <button onclick="updateScore('away', 3)">+3</button>
          <button onclick="updateScore('away', -1)">-1</button>
        </div>
        <p>Fouls: <span id="awayFouls">0</span></p>
        <button onclick="updateFouls('away', 1)">Add Foul</button>
        <button onclick="updateFouls('away', -1)">Remove Foul</button>
        <p>Timeouts: <span id="awayTimeouts">5</span></p>
        <button onclick="updateTimeouts('away', -1)">Use Timeout</button>
      </div>
    </div>

    <div class="center-panel">
      <h2>Game Clock</h2>
      <div class="clock" id="clock">12:00</div>
      <div class="clock-controls">
        <button onclick="startClock()">Start</button>
        <button onclick="stopClock()">Stop</button>
        <button onclick="resetClock()">Reset</button>
      </div>

      <div class="game-info">
        <div class="stat-box">Period: <span id="period">1</span></div>
        <div class="stat-box">
          <button onclick="changePeriod(-1)">-</button>
          <button onclick="changePeriod(1)">+</button>
        </div>
      </div>
    </div>

    <div class="footer">
      This scoreboard project was made by James Thomas of ScoreHub Technologies. 
      2026 - ScoreHub Tech
    </div>
  </div>

  <script>
    let homeScore = 0;
    let awayScore = 0;
    let homeFouls = 0;
    let awayFouls = 0;
    let homeTimeouts = 5;
    let awayTimeouts = 5;
    let period = 1;

    let timeLeft = 12 * 60;
    let timer = null;

    function setTeamNames() {
      const home = document.getElementById("homeName").value || "Home Team";
      const away = document.getElementById("awayName").value || "Away Team";
      document.getElementById("homeTeam").textContent = home;
      document.getElementById("awayTeam").textContent = away;
    }

    function updateScore(team, points) {
      if (team === "home") {
        homeScore = Math.max(0, homeScore + points);
        document.getElementById("homeScore").textContent = homeScore;
      } else {
        awayScore = Math.max(0, awayScore + points);
        document.getElementById("awayScore").textContent = awayScore;
      }
    }

    function updateFouls(team, amount) {
      if (team === "home") {
        homeFouls = Math.max(0, homeFouls + amount);
        document.getElementById("homeFouls").textContent = homeFouls;
      } else {
        awayFouls = Math.max(0, awayFouls + amount);
        document.getElementById("awayFouls").textContent = awayFouls;
      }
    }

    function updateTimeouts(team, amount) {
      if (team === "home") {
        homeTimeouts = Math.max(0, homeTimeouts + amount);
        document.getElementById("homeTimeouts").textContent = homeTimeouts;
      } else {
        awayTimeouts = Math.max(0, awayTimeouts + amount);
        document.getElementById("awayTimeouts").textContent = awayTimeouts;
      }
    }

    function updateClockDisplay() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      document.getElementById("clock").textContent =
        `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function startClock() {
      if (timer) return;
      timer = setInterval(() => {
        if (timeLeft > 0) {
          timeLeft--;
          updateClockDisplay();
        } else {
          stopClock();
          alert("Period ended!");
        }
      }, 1000);
    }

    function stopClock() {
      clearInterval(timer);
      timer = null;
    }

    function resetClock() {
      stopClock();
      timeLeft = 12 * 60;
      updateClockDisplay();
    }

    function changePeriod(amount) {
      period = Math.max(1, period + amount);
      document.getElementById("period").textContent = period;
    }

    updateClockDisplay();
  </script>
</body>
</html>
