<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>School Sports Teams</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .team-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 30px;
    }

    .team-card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 220px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background: #007BFF;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>School Sports Teams</h1>

  <div class="team-container">
    <div class="team-card">
      <h2>Redhawks</h2>
      <p>Sport: Basketball</p>
      <button onclick="startGame('Tigers')">Start Game</button>
    </div>

    <div class="team-card">
      <h2>Wildcats 7</h2>
      <p>Sport: Basketball</p>
      <button onclick="startGame('Eagles')">Start Game</button>
    </div>

    <div class="team-card">
      <h2>Patriots</h2>
      <p>Sport: Basketball</p>
      <button onclick="startGame('Warriors')">Start Game</button>
    </div>
  </div>

  <a href="index.html">⬅ Back to Scoreboard</a>

  <script>
    function startGame(teamName) {
      // Save selected team
      localStorage.setItem("selectedTeam", teamName);

      // Go to scoreboard page
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
